<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Forme gauche : rectangle -->
  <rect x="20" y="50" width="100" height="500" rx="10" fill="#C20000" stroke="none"/>

  <!-- Forme centrale : forme principale avec trou en bas -->
  <path d="M 130 50 Q 170 100 170 300 Q 170 500 130 550 L 130 50 Z
           M 130 500 Q 150 520 170 500 Q 170 480 150 480 Q 130 480 130 500 Z"
        fill="#C20000" stroke="none"/>

  <!-- Forme droite : rectangle avec bord courbe -->
  <path d="M 200 50 L 360 50 Q 380 150 360 300 Q 340 500 300 550 L 200 550 Z"
        fill="#C20000" stroke="none"/>

  <!-- Petit arc en bas centre -->
  <path d="M 140 530 Q 155 545 170 530 Q 170 515 155 515 Q 140 515 140 530 Z"
        fill="#C20000" stroke="none"/>
</svg>
