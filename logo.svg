<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 195">
  <defs>
    <linearGradient id="beam" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="1"/>
      <stop offset="85%" stop-color="#F5A623" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F5A623" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Light beam (triangle from lantern right side) -->
  <path d="M 100,28 L 296,4 L 296,54 Z" fill="url(#beam)"/>

  <!-- Base platform -->
  <rect x="58" y="114" width="64" height="7" rx="1" fill="#1B2B4B"/>

  <!-- Tower body (trapezoid — wider at base) -->
  <path d="M 66,114 L 114,114 L 100,38 L 80,38 Z" fill="#1B2B4B"/>

  <!-- Lantern room (rectangular, sits on top of tower) -->
  <rect x="80" y="14" width="20" height="25" rx="0.8" fill="#1B2B4B"/>

  <!-- PHARE text -->
  <text
    x="90" y="178"
    text-anchor="middle"
    font-family="IBM Plex Sans, Arial, sans-serif"
    font-size="30"
    font-weight="700"
    letter-spacing="10"
    fill="#1B2B4B">PHARE</text>
</svg>
