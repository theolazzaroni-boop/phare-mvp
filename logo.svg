<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80">
  <defs>
    <linearGradient id="beam" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="1"/>
      <stop offset="60%" stop-color="#E8C87A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F0D89A" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Beam (exits from lantern top-right, fans toward upper right) -->
  <path d="M 40,16 L 230,0 L 230,30 Z" fill="url(#beam)"/>

  <!-- Base platform -->
  <rect x="6" y="66" width="48" height="6" rx="1" fill="#1B2B4B"/>

  <!-- Tower body (trapezoid) -->
  <path d="M 14,66 L 46,66 L 40,22 L 20,22 Z" fill="#1B2B4B"/>

  <!-- Lantern room -->
  <rect x="19" y="8" width="22" height="15" rx="0.8" fill="#1B2B4B"/>

  <!-- PHARE text -->
  <text
    x="68" y="58"
    font-family="IBM Plex Sans, Arial, sans-serif"
    font-size="40"
    font-weight="700"
    letter-spacing="3"
    fill="#1B2B4B">PHARE</text>
</svg>
